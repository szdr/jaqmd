name: CI

on:
  push:
    branches: [main]
  pull_request:

# 同一ブランチ/PRの古い実行をキャンセルして無駄を省く
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Install just
        uses: extractions/setup-just@v4

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run checks (lint + fmt-check + test)
        run: just check
