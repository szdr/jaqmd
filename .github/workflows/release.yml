name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # GitHub Release 作成
  id-token: write   # PyPI Trusted Publishing (OIDC)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0   # git-cliff がリリースノート生成に全履歴を要する

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.14

      - name: Build
        run: uv build

      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish --trusted-publishing always

      - name: Generate release notes
        run: uvx git-cliff --latest --strip all -o RELEASE_NOTES.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --title "${GITHUB_REF_NAME}" --notes-file RELEASE_NOTES.md
